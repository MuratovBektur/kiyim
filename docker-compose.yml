# Base topology, shared by dev and prod: backend + frontend + nginx, all
# internal except nginx. Prod runs this file alone; dev layers
# docker-compose.dev.yml on top (build target + hot-reload volumes only —
# the services/network/exposed-port shape stays identical).
services:
  backend:
    build:
      context: ./backend
      target: prod
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://kiyim:kiyim@postgres:5432/kiyim?schema=public}
      PORT: 3001
      FRONTEND_URL: ${PUBLIC_URL:-http://localhost:8088}
    networks:
      - kiyim-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: prod
    environment:
      NUXT_PUBLIC_API_BASE: /api
      NUXT_API_BASE_SERVER: http://backend:3001
    depends_on:
      - backend
    networks:
      - kiyim-network
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8088}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - kiyim-network
    restart: unless-stopped

networks:
  kiyim-network:
    external: true
    name: kiyim-network
